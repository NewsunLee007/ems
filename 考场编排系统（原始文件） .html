            );
        };

        const ExamNumberRule = ({ rule, setRule, useImportedExamNumber, setUseImportedExamNumber }) => {
            const [draggedIndex, setDraggedIndex] = useState(null);

            const sources = [
                { value: 'schoolYear', label: '学年' },
                { value: 'term', label: '学期' },
                { value: 'grade', label: '年级' },
                { value: 'class', label: '班级' },
                { value: 'classSeat', label: '班内序号' },
                { value: 'classroomNumber', label: '考场号' },
                { value: 'seatNumber', label: '座位号' },
                { value: 'schoolCode', label: '学校代码' },
                { value: 'fixedString', label: '固定字符串' },
            ];

            const handleUpdate = (id, field, value) => {
                if (useImportedExamNumber) return;
                setRule(rule.map(r => r.id === id ? { ...r, [field]: value } : r));
            };

            const handleAdd = () => {
                if (useImportedExamNumber) return;
                setRule([...rule, { id: `r${Date.now()}`, name: '新分段', source: 'fixedString', length: 2, value: '' }]);
            };
            
            const handleDelete = (id) => {
                if (useImportedExamNumber) return;
                setRule(rule.filter(r => r.id !== id));
            };

            const handleDragStart = (e, index) => {
                if (useImportedExamNumber) return;
                setDraggedIndex(index);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleDrop = (e, dropIndex) => {
                e.preventDefault();
                if (useImportedExamNumber) return;
                if (draggedIndex === null || draggedIndex === dropIndex) {
                    setDraggedIndex(null);
                    return;
                }
                const newRule = [...rule];
                const draggedItem = newRule.splice(draggedIndex, 1)[0];
                newRule.splice(dropIndex, 0, draggedItem);
                setRule(newRule);
                setDraggedIndex(null);
            };

            const totalLength = useMemo(() => rule.reduce((acc, r) => acc + Number(r.length || 0), 0), [rule]);

            return (
                <div>
                    <div className="bg-white/90 backdrop-blur p-8 rounded-2xl shadow-lg border border-white/50 max-w-5xl">
                        <div className="mb-6 flex flex-col gap-3">
                            <label className="flex items-center space-x-2 cursor-pointer select-none">
                                <input
                                    type="checkbox"
                                    checked={useImportedExamNumber}
                                    onChange={(e) => setUseImportedExamNumber(e.target.checked)}
                                    className="h-5 w-5 rounded text-blue-600 focus:ring-blue-500"
                                />
                                <span className="text-gray-800 font-medium">直接引用上传表格中的考号（跳过本页规则）</span>
                            </label>
                            {useImportedExamNumber && (
                                <div className="text-sm text-gray-600 bg-blue-50 border border-blue-100 rounded-lg p-3">
                                    已启用直接引用考号：编排结果将使用“考生信息”中导入的考号字段，本页规则暂不生效。
                                </div>
                            )}
                        </div>
                        <div className="mb-6 p-4 border-2 border-dashed rounded-lg flex items-center justify-center space-x-2 bg-gray-50">
                            {rule.map(r => (
                                <div key={r.id} className="p-2 bg-blue-100 border border-blue-300 rounded text-center">
                                    <div className="text-sm text-blue-800 font-semibold">{r.name}</div>
                                    <div className="text-xs text-blue-600">{r.length}位</div>
                                </div>
                            ))}
                            <div className="p-2 bg-gray-200 rounded text-center">
                                <div className="text-sm font-semibold">总长度</div>
                                <div className={`text-xs ${totalLength === 12 ? 'text-green-600' : 'text-red-600'}`}>{totalLength}位</div>
                            </div>
                        </div>
                        <div className="space-y-2">
                            {rule.map((r, index) => (
                                <div 
                                    key={r.id}
                                    draggable={!useImportedExamNumber}
                                    onDragStart={(e) => handleDragStart(e, index)}
                                    onDragOver={handleDragOver}
                                    onDrop={(e) => handleDrop(e, index)}
                                    onDragEnd={() => setDraggedIndex(null)}
                                    className={`p-2 border rounded-lg bg-gray-50 transition-shadow flex items-center space-x-4 ${draggedIndex === index ? 'shadow-lg opacity-50' : 'shadow-sm'} ${useImportedExamNumber ? 'opacity-60' : ''}`}
                                >
                                    <span className={`${useImportedExamNumber ? 'cursor-not-allowed text-gray-300' : 'cursor-move text-gray-400 hover:text-gray-600'}`}>
                                        <icons.GripVertical />
                                    </span>
                                    <div className="grid grid-cols-1 md:grid-cols-5 gap-4 items-center flex-grow">
                                        <input type="text" placeholder="分段名称" value={r.name} onChange={e => handleUpdate(r.id, 'name', e.target.value)} disabled={useImportedExamNumber} className="p-2 border rounded-md" />
                                        <select value={r.source} onChange={e => handleUpdate(r.id, 'source', e.target.value)} disabled={useImportedExamNumber} className="p-2 border rounded-md">
                                            {sources.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                                        </select>
                                        {(r.source === 'fixedString' || r.source === 'schoolCode') ? (
                                            <input 
                                                type="text" 
                                                placeholder="自定义值" 
                                                value={r.value || ''} 
                                                onChange={e => handleUpdate(r.id, 'value', e.target.value)} 
                                                disabled={useImportedExamNumber}
                                                className="p-2 border rounded-md" 
                                            />
                                        ) : (
                                            <div className="p-2 text-gray-400 text-center italic"> (自动获取) </div>
                                        )}
                                        <input type="number" placeholder="长度" value={r.length} onChange={e => handleUpdate(r.id, 'length', e.target.value)} disabled={useImportedExamNumber} className="p-2 border rounded-md" />
                                        <button onClick={() => handleDelete(r.id)} disabled={useImportedExamNumber} className={`flex items-center justify-center ${useImportedExamNumber ? 'text-gray-300 cursor-not-allowed' : 'text-red-500 hover:text-red-700'}`}>
                                            <icons.Trash2 size={18} />
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={handleAdd} disabled={useImportedExamNumber} className={`mt-6 px-4 py-2 rounded-lg flex items-center ${useImportedExamNumber ? 'bg-gray-300 text-white cursor-not-allowed' : 'bg-blue-500 text-white hover:bg-blue-600'}`}>
                            <icons.Plus className="h-4 w-4 mr-2" />
                            添加分段
                        </button>
                    </div>
                </div>
            );
        };

        const ArrangementEngine = ({ students, classrooms, examSessions, examSettings, examNumberRule, useImportedExamNumber, arrangementResult, setArrangementResult, classDisplaySetting }) => {
            const [selectedGrades, setSelectedGrades] = useState([]);
            const [arrangementPrinciple, setArrangementPrinciple] = useState('avoid'); // 'random' or 'avoid'
            const [strictCategoryGrouping, setStrictCategoryGrouping] = useState(false);
            const [categoryFillMode, setCategoryFillMode] = useState('independent'); // 'independent' or 'continuous'
            const [keepOriginalOrder, setKeepOriginalOrder] = useState(false);
            const [ignoreGradeMatching, setIgnoreGradeMatching] = useState(false);
            const [selectedExamIds, setSelectedExamIds] = useState([]);
            const [selectedClassroomIds, setSelectedClassroomIds] = useState([]);
            const [selectedStudentIds, setSelectedStudentIds] = useState([]);
            const [studentGradeFilter, setStudentGradeFilter] = useState('all');
            const [studentClassFilter, setStudentClassFilter] = useState('all');

            const gradeStats = useMemo(() => {
                const grades = new Set([
                    ...students.map(s => normalizeGrade(s.grade)),
                    ...classrooms.map(c => normalizeGrade(c.grade)),
                ].filter(Boolean));

                const classroomTotalCount = classrooms.length;

                return Array.from(grades).sort().map(grade => {
                    const studentCount = students.reduce((acc, s) => acc + (normalizeGrade(s.grade) === grade ? 1 : 0), 0);
                    const classroomCount = classrooms.reduce((acc, c) => acc + (normalizeGrade(c.grade) === grade ? 1 : 0), 0);
                    return {
                        grade,
                        studentCount,
                        classroomCount,
                        canArrange: ignoreGradeMatching ? (studentCount > 0 && classroomTotalCount > 0) : (studentCount > 0 && classroomCount > 0),
                    };
                });
            }, [students, classrooms, ignoreGradeMatching]);

            const gradeStatsMap = useMemo(() => {
                const map = new Map();
                gradeStats.forEach(s => map.set(s.grade, s));
                return map;
            }, [gradeStats]);

            useEffect(() => {
                setSelectedExamIds((examSessions || []).map(e => e.id));
            }, [examSessions]);
            useEffect(() => {
                setSelectedClassroomIds(classrooms.map(c => c.id));
            }, [classrooms]);
            useEffect(() => {
                setSelectedStudentIds(students.map(s => s.id));
            }, [students]);
            useEffect(() => {
                const autoGrades = gradeStats.filter(g => g.canArrange).map(g => g.grade);
                if (autoGrades.length > 0 && selectedGrades.length === 0) setSelectedGrades(autoGrades);
            }, [gradeStats, selectedGrades.length]);

            const handleGradeSelection = (grade) => {
                const stats = gradeStatsMap.get(grade);
                if (stats && !stats.canArrange) return;
                setSelectedGrades(prev => 
                    prev.includes(grade) ? prev.filter(g => g !== grade) : [...prev, grade]
                );
            };

            const handleArrange = () => {
                if (selectedGrades.length === 0) {
                    alert('请至少选择一个要编排的年级。');
                    return;
                }

                const invalidGrades = selectedGrades
                    .map(g => ({
                        grade: normalizeGrade(g),
                        stats: gradeStatsMap.get(normalizeGrade(g)),
                    }))
                    .filter(x => !x.stats || !x.stats.canArrange);

                if (invalidGrades.length > 0) {
                    const detail = invalidGrades.map(x => {
                        const studentCount = x.stats?.studentCount ?? 0;
                        const classroomCount = x.stats?.classroomCount ?? 0;
                        return `${x.grade}年级：考生 ${studentCount} 人 / 考场 ${classroomCount} 间`;
                    }).join('\n');
                    alert(`选中的年级缺少考生或考场信息，无法编排！\n\n${detail}`);
                    return;
                }

                if (!window.confirm(`确定要为选中的 ${selectedGrades.join(', ')}年级 进行编排吗？这会覆盖现有的编排结果。`)) return;

                const selectedGradeSet = new Set(selectedGrades.map(g => normalizeGrade(g)).filter(Boolean));
                const studentsToArrange = students.filter(s => selectedStudentIds.includes(s.id) && selectedGradeSet.has(normalizeGrade(s.grade)));
                const classroomsToUseRaw = classrooms.filter(c => selectedClassroomIds.includes(c.id));
                const classroomsToUse = ignoreGradeMatching ? classroomsToUseRaw : classroomsToUseRaw.filter(c => selectedGradeSet.has(normalizeGrade(c.grade)));
                if (selectedExamIds.length === 0) {
                    alert('请至少选择一个考试场次。');
                    return;
                }
                
                if (studentsToArrange.length === 0 || classroomsToUse.length === 0) {
                    alert('选中的年级没有考生或考场信息，无法编排！');
                    return;
                }

                // --- Helper Functions ---
                const fisherYatesShuffle = (array) => {
                    for (let i = array.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [array[i], array[j]] = [array[j], array[i]];
                    }
                    return array;
                };

                const optimizeClassroom = (students, layoutStr) => {
                    if (!layoutStr) return students;
                    const cols = layoutStr.split(',').map(Number);
                    const numCols = cols.length;
                    
                    // Build 2D Grid map: grid[row][col] = studentIndex in 'students' array
                    let gridMap = []; // Stores {r, c} for each linear index
                    let cellToLinearIndex = {}; // "r,c" -> linearIndex
                    
                    let currentIndex = 0;
                    for (let c = 0; c < numCols; c++) {
                        for (let r = 0; r < cols[c]; r++) {
                            if (currentIndex < students.length) {
                                gridMap[currentIndex] = { r, c };
                                cellToLinearIndex[`${r},${c}`] = currentIndex;
                                currentIndex++;
                            }
                        }
                    }

                    const getStudentAt = (r, c, currentList) => {
                        const idx = cellToLinearIndex[`${r},${c}`];
                        if (idx === undefined) return null;
                        return currentList[idx];
                    };

                    const countConflicts2D = (list) => {
                        let conflicts = 0;
                        for (let i = 0; i < list.length; i++) {
                            const { r, c } = gridMap[i];
                            const me = list[i];
                            
                            // Check Vertical Neighbor (r+1, c)
                            let neighbor = getStudentAt(r + 1, c, list);
                            if (neighbor && neighbor.class === me.class) conflicts++;
                            
                            // Check Horizontal Neighbor (r, c+1)
                            neighbor = getStudentAt(r, c + 1, list);
                            if (neighbor && neighbor.class === me.class) conflicts++;
                        }
                        return conflicts;
                    };

                    let currentList = [...students];
                    let currentCost = countConflicts2D(currentList);
                    const maxIter = 10000; // Reduced iter for performance in loops

                    for (let iter = 0; iter < maxIter; iter++) {
                        if (currentCost === 0) break;
                        const idx1 = Math.floor(Math.random() * currentList.length);
                        const idx2 = Math.floor(Math.random() * currentList.length);
                        if (idx1 === idx2) continue;
                        [currentList[idx1], currentList[idx2]] = [currentList[idx2], currentList[idx1]];
                        const newCost = countConflicts2D(currentList);
                        if (newCost <= currentCost) {
                            currentCost = newCost;
                        } else {
                            [currentList[idx1], currentList[idx2]] = [currentList[idx2], currentList[idx1]];
                        }
                    }
                    return currentList;
                };

                let finalArrangement = [];

                if (keepOriginalOrder) {
                    const totalCapacity = classroomsToUse.reduce((sum, c) => sum + getClassroomEffectiveCapacity(c), 0);
                    if (studentsToArrange.length > totalCapacity) {
                        alert(`错误：考场容量不足（考生 ${studentsToArrange.length} 人，座位 ${totalCapacity} 个），无法按原序完成编排！`);
                        return;
                    }

                    let studentIndex = 0;
                    for (const classroom of classroomsToUse) {
                        const roomCapacity = getClassroomEffectiveCapacity(classroom);
                        if (roomCapacity <= 0) continue;
                        for (let i = 0; i < roomCapacity; i++) {
                            if (studentIndex >= studentsToArrange.length) break;
                            finalArrangement.push({
                                ...studentsToArrange[studentIndex],
                                classroomName: classroom.name,
                                classroomNumber: classroom.number,
                                seatNumber: i + 1,
                            });
                            studentIndex++;
                        }
                        if (studentIndex >= studentsToArrange.length) break;
                    }
                } else if (strictCategoryGrouping) {
                     // --- Strict Category Grouping Mode ---
                     // Group all students by category
                     const studentsByCategory = {};
                     studentsToArrange.forEach(s => {
                         const cat = s.category || '未分类';
                         if (!studentsByCategory[cat]) studentsByCategory[cat] = [];
                         studentsByCategory[cat].push(s);
                     });

                     // Sort categories
                     const categories = Object.keys(studentsByCategory).sort((a, b) => {
                         const numA = parseFloat(a);
                         const numB = parseFloat(b);
                         if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                         return a.localeCompare(b);
                     });

                     let classroomIndex = 0;
                     let currentRoomSeatUsedCount = 0; // Tracks seats used in the current classroom across categories

                     for (const cat of categories) {
                         let catStudents = studentsByCategory[cat];
                         // Shuffle students within category
                         catStudents = fisherYatesShuffle([...catStudents]);

                         let catStudentIdx = 0;
                         
                         // Assign to classrooms
                         while (catStudentIdx < catStudents.length) {
                             if (classroomIndex >= classroomsToUse.length) {
                                 alert(`错误：考场数量不足，无法完成分类 "${cat}" 的编排！`);
                                 return;
                             }

                            const classroom = classroomsToUse[classroomIndex];
                            const roomCapacity = getClassroomEffectiveCapacity(classroom);
                            if (roomCapacity <= 0) {
                                classroomIndex++;
                                currentRoomSeatUsedCount = 0;
                                continue;
                            }
                            const remainingInCat = catStudents.length - catStudentIdx;
                             
                             // Calculate available seats in current room
                             // If continuous mode: use capacity - used
                             // If independent mode: capacity (since we always start fresh or fill fresh, logic below handles switch)
                            const availableSeats = roomCapacity - currentRoomSeatUsedCount;
                             
                             // If no seats left (shouldn't happen if logic is correct, but safe guard)
                             if (availableSeats <= 0) {
                                 classroomIndex++;
                                 currentRoomSeatUsedCount = 0;
                                 continue;
                             }

                             const countToFill = Math.min(remainingInCat, availableSeats);
                             
                             const chunk = catStudents.slice(catStudentIdx, catStudentIdx + countToFill);
                             let placedChunk = chunk;
                             
                             if (arrangementPrinciple === 'avoid') {
                                 // Note: Optimization might be less effective if filling partial rooms sequentially
                                 // But we still apply it to the chunk being inserted
                                 placedChunk = optimizeClassroom(chunk, classroom.layoutDetail);
                             }

                             placedChunk.forEach((s, i) => {
                                 finalArrangement.push({
                                     ...s,
                                     classroomName: classroom.name,
                                     classroomNumber: classroom.number,
                                     seatNumber: currentRoomSeatUsedCount + i + 1 // Offset by already used seats
                                 });
                             });

                             catStudentIdx += countToFill;
                             currentRoomSeatUsedCount += countToFill;
                             
                             // Check if room is full
                            if (currentRoomSeatUsedCount >= roomCapacity) {
                                classroomIndex++;
                                currentRoomSeatUsedCount = 0;
                            } 
                             // If room is NOT full, but category IS finished:
                             else if (catStudentIdx >= catStudents.length) {
                                 if (categoryFillMode === 'independent') {
                                     // Independent mode: Force move to next room, leave rest empty
                                     classroomIndex++;
                                     currentRoomSeatUsedCount = 0;
                                 }
                                 // Continuous mode: Do nothing. Keep classroomIndex and currentRoomSeatUsedCount as is.
                                 // Next category will pick up from here.
                             }
                         }
                     }
                } else {
                    // --- Original Mode (Random / Avoid) ---
                    const specialStudents = studentsToArrange.filter(s => s.special);
                    let regularStudents = studentsToArrange.filter(s => !s.special);

                    regularStudents = fisherYatesShuffle([...regularStudents]);

                    if (arrangementPrinciple === 'avoid') {
                        let optimizedStudents = [];
                        let studentIndex = 0;
                        const regularClassrooms = classroomsToUse.slice(0, -1);
                        for (const classroom of regularClassrooms) {
                            const roomCapacity = getClassroomEffectiveCapacity(classroom);
                            const chunk = regularStudents.slice(studentIndex, studentIndex + roomCapacity);
                            studentIndex += roomCapacity;
                            if (chunk.length > 0) {
                                optimizedStudents.push(...optimizeClassroom(chunk, classroom.layoutDetail));
                            }
                        }
                        const remainingRegular = regularStudents.slice(studentIndex);
                        if (remainingRegular.length > 0) {
                             const lastClassroom = classroomsToUse[classroomsToUse.length - 1];
                             if (lastClassroom) {
                                 optimizedStudents.push(...optimizeClassroom(remainingRegular, lastClassroom.layoutDetail));
                             } else {
                                 optimizedStudents.push(...remainingRegular);
                             }
                        }
                        regularStudents = optimizedStudents;
                    }

                    let studentIndex = 0;
                    const regularClassrooms = classroomsToUse.slice(0, -1);
                    for (const classroom of regularClassrooms) {
                        if (studentIndex >= regularStudents.length) break;
                        const roomCapacity = getClassroomEffectiveCapacity(classroom);
                        if (roomCapacity <= 0) continue;
                        for (let i = 0; i < roomCapacity; i++) {
                            if (studentIndex >= regularStudents.length) break;
                            finalArrangement.push({ ...regularStudents[studentIndex], classroomName: classroom.name, classroomNumber: classroom.number, seatNumber: i + 1 });
                            studentIndex++;
                        }
                    }
                    const lastClassroom = classroomsToUse[classroomsToUse.length - 1];
                    const lastClassroomStudents = [...regularStudents.slice(studentIndex), ...specialStudents];
                    const lastRoomCapacity = getClassroomEffectiveCapacity(lastClassroom);
                    if (!lastClassroom || lastRoomCapacity <= 0) {
                        alert('错误：缺少可用考场座位信息，无法完成编排。');
                        return;
                    }
                    if (lastClassroomStudents.length > lastRoomCapacity) {
                        alert(`错误：考场容量不足（考生 ${studentsToArrange.length} 人，座位 ${classroomsToUse.reduce((sum, c) => sum + getClassroomEffectiveCapacity(c), 0)} 个），无法完成编排！`);
                        return;
                    }
                    lastClassroomStudents.forEach((student, i) => {
                        if(lastClassroom) {
                            finalArrangement.push({ ...student, classroomName: lastClassroom.name, classroomNumber: lastClassroom.number, seatNumber: i + 1 });
                        }
                    });
                }
                if (useImportedExamNumber) {
                    const missingCount = finalArrangement.reduce((acc, s) => acc + (!String(s.examNumber || '').trim() ? 1 : 0), 0);
                    if (missingCount > 0) {
                        alert(`错误：已启用直接引用考号，但有 ${missingCount} 名考生未导入考号。请在考生导入表中补充“考号”列后重新导入。`);
                        return;
                    }
                }

                const resultWithExamNumbers = useImportedExamNumber
                    ? finalArrangement.map(student => ({ ...student, examNumber: String(student.examNumber || '').trim() }))
                    : finalArrangement.map(student => {
                        let examNumber = '';
                        examNumberRule.forEach(rule => {
                            let segment = '';
                            switch (rule.source) {
                                case 'schoolYear': segment = examSettings.schoolYear.slice(-2); break;
                                case 'term': segment = String(examSettings.term).padStart(2, '0'); break;
                                case 'grade': segment = student.grade.padStart(2, '0'); break;
                                case 'classroomNumber': segment = (student.classroomNumber.match(/\d+/) || ['0'])[0].padStart(rule.length, '0'); break;
                                case 'seatNumber': segment = String(student.seatNumber).padStart(rule.length, '0'); break;
                                case 'classSeat': segment = String(student.classSeat || '').padStart(rule.length, '0'); break;
                                case 'class': 
                                    const numericPart = student.class.replace(/\D/g, '');
                                    segment = numericPart.slice(-2).padStart(rule.length, '0'); 
                                    break;
                                case 'schoolCode':
                                case 'fixedString':
                                    segment = rule.value || '';
                                    break;
                                default: segment = ''.padStart(rule.length, '0');
                            }
                            examNumber += segment.slice(0, rule.length);
                        });
                        return { ...student, examNumber };
                    });
                setArrangementResult(resultWithExamNumbers);
                alert('考场编排完成！');
            };

            const studentGrades = Array.from(new Set(students.map(s => normalizeGrade(s.grade)).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
            const studentClasses = Array.from(new Set(students.map(s => String(s.class || '').trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
            const filteredStudents = students.filter(s => {
                if (studentGradeFilter !== 'all' && normalizeGrade(s.grade) !== studentGradeFilter) return false;
                if (studentClassFilter !== 'all' && String(s.class || '').trim() !== studentClassFilter) return false;
                return true;
            });
            const toggleExam = (id) => setSelectedExamIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const toggleClassroom = (id) => setSelectedClassroomIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const toggleStudent = (id) => setSelectedStudentIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

            return (
                <div>
                    <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50 mb-6">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
                            <div className="bg-white/80 border border-slate-200 rounded-xl p-3">
                                <div className="flex items-center justify-between mb-2">

        const PrintAndExport = ({ arrangementResult, examSettings, classrooms, classDisplaySetting, setClassDisplaySetting }) => {
            const { jsPDF } = window.jspdf;
            const [fontSize, setFontSize] = useState(18);
            const [classroomRowPadding, setClassroomRowPadding] = useState(20);
            const [classListRowPadding, setClassListRowPadding] = useState(4);
            const [bureauRoomNoMode, setBureauRoomNoMode] = useState('default');
            const [isExporting, setIsExporting] = useState(false);

            // --- Helper: Generate PDF from HTML Strings using html2canvas ---
            const generatePDF = async (pagesContent, fileName, orientation = 'p') => {
                setIsExporting(true);
                try {
                    const doc = new jspdf.jsPDF(orientation, 'mm', 'a4');
                    const pageWidth = doc.internal.pageSize.getWidth();
                    const pageHeight = doc.internal.pageSize.getHeight();

                    // Create a hidden container for rendering
                    const container = document.createElement('div');
                    container.style.position = 'fixed';
                    container.style.top = '-10000px';
                    container.style.left = '-10000px';
                    container.style.zIndex = '-100';
                    // Set width to match A4 width in pixels (approx 96 DPI or higher for quality)
                    const a4WidthPx = orientation === 'p' ? 794 : 1123; 
                    const a4HeightPx = orientation === 'p' ? 1123 : 794;
                    const scaleFactor = 2; // High resolution
                    
                    container.style.width = `${a4WidthPx * scaleFactor}px`;
                    container.style.minHeight = `${a4HeightPx * scaleFactor}px`; // Ensure container is at least full page height
                    container.style.backgroundColor = '#fff';
                    container.style.display = 'flex'; // Use flexbox for vertical centering
                    container.style.flexDirection = 'column';
                    container.style.justifyContent = 'flex-start'; // Align to top
                    container.style.alignItems = 'center'; // Horizontal centering
                    container.style.padding = '60px'; // Add padding to container itself as a safe margin
                    container.style.paddingTop = '80px'; // Extra top padding
                    
                    document.body.appendChild(container);

                    for (let i = 0; i < pagesContent.length; i++) {
                        if (i > 0) doc.addPage();
                        
                        // Reset container content
                        container.innerHTML = pagesContent[i];
                        
                        // Wait a bit for rendering (fonts, layout)
                        await new Promise(resolve => setTimeout(resolve, 100));

                        const canvas = await html2canvas(container, {
                            scale: 1, // We already scaled the container size
                            useCORS: true,
                            logging: false,
                            windowWidth: a4WidthPx * scaleFactor,
                            windowHeight: a4HeightPx * scaleFactor // Ensure we capture full height
                        });

                        const imgData = canvas.toDataURL('image/jpeg', 0.78);
                        
                        // Add image to PDF (fit to page)
                        doc.addImage(imgData, 'JPEG', 0, 0, pageWidth, pageHeight, undefined, 'MEDIUM');
                    }
                    
                    document.body.removeChild(container);
                    doc.save(`${fileName}.pdf`);
                } catch (e) {
                    console.error("PDF Export Error:", e);
                    alert("PDF导出失败: " + e.message);
                } finally {
                    setIsExporting(false);
                }
            };

            const exportToExcel = (data, fileName) => {
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
                XLSX.writeFile(wb, `${fileName}.xlsx`);
            };

            const exportClassInfo = (format) => {
                const studentsByClass = arrangementResult.reduce((acc, s) => {
                    acc[s.class] = acc[s.class] || [];
                    acc[s.class].push(s);
                    return acc;
                }, {});

                if(format === 'pdf') {
                    const pages = [];
                    Object.keys(studentsByClass).sort().forEach((className) => {
                        const classStudents = studentsByClass[className].sort((a,b) => a.classSeat - b.classSeat);
                        const title = `${examSettings.schoolYear}学年第${examSettings.term}学期 ${examSettings.examName} - 考场安排 (班级: ${formatClassForOutput(className, classDisplaySetting)})`;
                        
                        const scaledFontSize = fontSize * 2; 
                        const scaledPadding = classListRowPadding * 2; // Scale padding

                        let html = `
                            <div style="width: 100%; padding: 40px; font-family: 'Noto Sans SC', sans-serif; color: #000; box-sizing: border-box; display: flex; flex-direction: column; align-items: center;">
                                <h2 style="text-align: center; font-size: ${36 * (fontSize/14)}px; margin-bottom: 30px; font-weight: bold; color: #1e3a8a;">${title}</h2>
                                <table style="width: 100%; border-collapse: collapse; font-size: ${scaledFontSize}px; border: 2px solid #1e3a8a;">
                                    <thead>
                                        <tr style="background-color: #1e3a8a; color: white;">
                                            <th style="border: 1px solid #1e3a8a; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; font-weight: bold;">班内序号</th>
                                            <th style="border: 1px solid #1e3a8a; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; font-weight: bold;">姓名</th>
                                            <th style="border: 1px solid #1e3a8a; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; font-weight: bold;">考号</th>
                                            <th style="border: 1px solid #1e3a8a; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; font-weight: bold;">班级</th>
                                            <th style="border: 1px solid #1e3a8a; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; font-weight: bold;">考场</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${classStudents.map((s, index) => `
                                            <tr style="background-color: ${index % 2 === 0 ? '#ffffff' : '#f8fafc'};">
                                                <td style="border: 1px solid #cbd5e1; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; height: ${scaledPadding * 4}px; color: #334155; line-height: 1.25; display: table-cell;">${s.classSeat}</td>
                                                <td style="border: 1px solid #cbd5e1; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; height: ${scaledPadding * 4}px; color: #334155; line-height: 1.25; font-weight: 500; display: table-cell;">${s.name}</td>
                                                <td style="border: 1px solid #cbd5e1; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; height: ${scaledPadding * 4}px; color: #334155; line-height: 1.25; display: table-cell;">${s.examNumber}</td>
                                                <td style="border: 1px solid #cbd5e1; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; height: ${scaledPadding * 4}px; color: #334155; line-height: 1.25; display: table-cell;">${formatClassForOutput(s.class, classDisplaySetting)}</td>
                                                <td style="border: 1px solid #cbd5e1; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; height: ${scaledPadding * 4}px; color: #334155; line-height: 1.25; display: table-cell;">${s.classroomName}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `;
                        pages.push(html);
                    });
                    generatePDF(pages, `班级安排 - ${examSettings.examName}`, 'p');
                } else {
                    const allStudentsData = [];
                    Object.keys(studentsByClass).sort().forEach(className => {
                        const classStudents = studentsByClass[className].sort((a,b) => a.classSeat - b.classSeat);
                        allStudentsData.push(...classStudents.map(s => ({
                            '班级': formatClassForOutput(s.class, classDisplaySetting),
                            '班内序号': s.classSeat,
                            '姓名': s.name,
                            '考号': s.examNumber,
                            '考场': s.classroomName
                        })));
                    });
                    exportToExcel(allStudentsData, `班级安排 - ${examSettings.examName}`);
                }
            };
            
            const exportClassroomLayout = (format) => {
                const studentsByClassroom = arrangementResult.reduce((acc, s) => {
                    acc[s.classroomNumber] = acc[s.classroomNumber] || [];
                    acc[s.classroomNumber].push(s);
                    return acc;
                }, {});

                if (format === 'pdf') {
                    const pages = [];
                    // Sort classroom numbers numerically (e.g. "第1考场", "第2考场", "第10考场")
                    const sortedClassroomNumbers = Object.keys(studentsByClassroom).sort((a, b) => {
                        const numA = parseInt(a.replace(/\D/g, '') || '0', 10);
                        const numB = parseInt(b.replace(/\D/g, '') || '0', 10);
                        if (numA !== numB) return numA - numB;
                        return a.localeCompare(b);
                    });

                    sortedClassroomNumbers.forEach((classroomNumber) => {
                        const classroomStudents = studentsByClassroom[classroomNumber];
                        const classroomInfo = classrooms.find(c => c.number === classroomNumber);
                        if (!classroomInfo) return;
                        
                        const title = `${examSettings.schoolYear}学年第${examSettings.term}学期 ${examSettings.examName} - ${classroomInfo.name} (${classroomNumber}) 位置编排`;
                        const layout = classroomInfo.layoutDetail.split(',').map(Number);
                        const maxRows = Math.max(...layout);
                        
                        // Prepare grid data for display
                        let tableBody = [];
                        for(let i=0; i<maxRows; i++){ tableBody.push(Array(layout.length).fill(null)); }
                        
                        let sIdx = 0;
                        for(let col=0; col<layout.length; col++){
                            for(let row=0; row<layout[col]; row++){
                                if(sIdx < classroomStudents.length){
                                    tableBody[row][col] = classroomStudents[sIdx];
                                    sIdx++;
                                } else {
                                    tableBody[row][col] = { name: '空', examNumber: '', class: '' }; // Empty seat placeholder
                                }
                            }
                        }

                        const scaledFontSize = fontSize * 2; 
                        const scaledPadding = classroomRowPadding * 2; // Scale padding

                        let html = `
                            <div style="width: 100%; padding: 40px; font-family: 'Noto Sans SC', sans-serif; color: #000; box-sizing: border-box; display: flex; flex-direction: column; align-items: center;">
                                <h2 style="text-align: center; font-size: ${36 * (fontSize/14)}px; margin-bottom: 20px; font-weight: bold; color: #1e3a8a;">${title}</h2>
                                <div style="text-align: center; margin-bottom: 20px; font-weight: bold; border: 2px solid #1e3a8a; padding: 10px; width: 200px; font-size: ${scaledFontSize * 1.1}px; background-color: #eff6ff; color: #1e3a8a; border-radius: 4px;">讲 台</div>
                                <table style="width: 100%; border-collapse: collapse; font-size: ${scaledFontSize}px; border: 2px solid #1e3a8a;">
                                    <thead>
                                        <tr>
                                            ${layout.map((_, i) => `<th style="border: 1px solid #1e3a8a; padding: 10px; background-color: #1e3a8a; color: white; font-weight: bold; vertical-align: middle;">第 ${i+1} 列</th>`).join('')}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${tableBody.map((row, rIdx) => `
                                            <tr>
                                                ${row.map(cell => {
                                                    if (cell === null) return '<td style="border: none;"></td>'; // No seat here
                                                    const content = cell.name === '空' ? '<span style="color: #94a3b8;">空</span>' : `
                                                        <div style="font-weight: bold; color: #1e293b; line-height: 1.2;">${cell.class ? formatClassForOutput(cell.class, classDisplaySetting) : ''} ${cell.name}</div>
                                                        <div style="font-size: 0.85em; margin-top: 4px; color: #64748b;">${cell.examNumber}</div>

                                                    return `<td style="border: 1px solid #cbd5e1; padding: ${scaledPadding}px; text-align: center; vertical-align: middle; background-color: #fff;">${content}</td>`;
                                                }).join('')}
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `;
                        pages.push(html);
                    });
                    generatePDF(pages, `考场座位表 - ${examSettings.examName}`, 'l'); // Landscape
                } else {
                    const wb = XLSX.utils.book_new();
                    // Sort classroom numbers numerically for Excel as well
                    const sortedClassroomNumbers = Object.keys(studentsByClassroom).sort((a, b) => {
                        const numA = parseInt(a.replace(/\D/g, '') || '0', 10);
                        const numB = parseInt(b.replace(/\D/g, '') || '0', 10);
                        if (numA !== numB) return numA - numB;
                        return a.localeCompare(b);
                    });

                    sortedClassroomNumbers.forEach(classroomNumber => {
                        const classroomStudents = studentsByClassroom[classroomNumber];

                        if (!classroomInfo) return;

                        const layout = classroomInfo.layoutDetail.split(',').map(Number);
                        const maxRows = Math.max(...layout);
                        const sheetData = [];
                        const header = layout.map((_, i) => `第 ${i+1} 列`);
                        sheetData.push(header);

                        let studentMap = {};
                        classroomStudents.forEach(s => {
                            studentMap[s.seatNumber] = `${formatClassForOutput(s.class, classDisplaySetting)} ${s.name} (${s.examNumber})`;

                        let seatCounter = 1;
                        for(let r=0; r<maxRows; r++){
                            const rowData = [];
                            for(let c=0; c<layout.length; c++){
                                if(r < layout[c]){
                                    rowData.push(studentMap[seatCounter] || '');
                                    seatCounter++;
                                } else {
                                    rowData.push('');
                                }
                            }
                            sheetData.push(rowData);
                        }
                        const ws = XLSX.utils.aoa_to_sheet(sheetData);
                        XLSX.utils.book_append_sheet(wb, ws, classroomInfo.name);
                    });
                    XLSX.writeFile(wb, `考场座位表 - ${examSettings.examName}.xlsx`);
                }
            };

            const exportForBureau = () => {
                const data = arrangementResult.map(s => ({ 
                    '学籍号': s.studentId, 
                    '考号': s.examNumber, 
                    '姓名': s.name, 
                    '班级': formatClassForOutput(s.class, classDisplaySetting), 
                    '小语种': '', 
                    '考场名称': s.classroomName,
                    '考场号': bureauRoomNoMode === 'byClassroomName' ? `第${String(s.classroomName || '').replace(/\D/g, '') || s.classroomName}考场` : s.classroomNumber, 
                    '座位号': s.seatNumber, 
                    '不参与统计': '' 
                }));
                exportToExcel(data, `教育局统考输出 - ${examSettings.examName}`);
            };
            
            const exportForInternal = () => {
                const data = arrangementResult.map(s => ({ '学籍号': s.studentId, '姓名': s.name, '考号': s.examNumber, '班级': formatClassForOutput(s.class, classDisplaySetting), '分类': '', '小语种': '', '是否参与统计': '是' }));
                exportToExcel(data, `校内考试输出 - ${examSettings.examName}`);
            };

            return (
                <div>
                    {/* Settings Panel */}
                    <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50 mb-6">
                        <h2 className="font-bold text-lg mb-4 flex items-center">
                            <icons.Settings className="w-5 h-5 mr-2" />
                            打印设置
                        </h2>
                        <div className="space-y-6">
                             {/* Font Size Slider */}
                            <div className="flex items-center space-x-4">
                                <label className="font-medium text-gray-700 w-32">全局字号缩放:</label>
                                <input 
                                    type="range" 
                                    min="8" 
                                    max="24" 
                                    value={fontSize} 
                                    onChange={(e) => setFontSize(Number(e.target.value))}
                                    className="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                />
                                <span className="text-gray-600 w-12">{fontSize}px</span>
                            </div>

                            {/* Classroom Row Height Slider */}
                             <div className="flex items-center space-x-4">
                                <label className="font-medium text-gray-700 w-32">考场座位间距:</label>
                                <input 
                                    type="range" 
                                    min="5" 
                                    max="30" 
                                    value={classroomRowPadding} 
                                    onChange={(e) => setClassroomRowPadding(Number(e.target.value))}
                                    className="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                />
                                <span className="text-gray-600 w-12">{classroomRowPadding}px</span>
                                <span className="text-sm text-gray-500">(调大此值以撑满考场页面)</span>
                            </div>

                            {/* Class List Row Height Slider */}
                            <div className="flex items-center space-x-4">
                                <label className="font-medium text-gray-700 w-32">班级名单间距:</label>
                                <input 
                                    type="range" 
                                    min="2" 
                                    max="20" 
                                    value={classListRowPadding} 
                                    onChange={(e) => setClassListRowPadding(Number(e.target.value))}
                                    className="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                />
                                <span className="text-gray-600 w-12">{classListRowPadding}px</span>
                                <span className="text-sm text-gray-500">(调小此值以容纳更多学生)</span>
                            </div>

                            <div className="flex flex-col sm:flex-row sm:items-center sm:space-x-4 space-y-2 sm:space-y-0">
                                <label className="font-medium text-gray-700 w-32">班级显示方式:</label>
                                <div className="flex flex-wrap items-center gap-3">
                                    <select
                                        value={classDisplaySetting?.mode || 'full'}
                                        onChange={(e) => {
                                            const nextMode = e.target.value;
                                            setClassDisplaySetting(prev => ({
                                                ...(prev || { mode: 'full', lastN: 2 }),
                                                mode: nextMode,
                                            }));
                                        }}
                                        className="p-2 border rounded-lg bg-white"
                                    >
                                        <option value="full">完整</option>
                                        <option value="lastN">后N位（补零）</option>
                                        <option value="inner">班号（括号/末位）</option>
                                    </select>

                                    {(classDisplaySetting?.mode || 'full') === 'lastN' && (
                                        <div className="flex items-center space-x-2">
                                            <span className="text-gray-600">N</span>
                                            <input
                                                type="number"
                                                min="1"
                                                max="6"
                                                value={classDisplaySetting?.lastN ?? 2}
                                                onChange={(e) => {
                                                    const nextN = clampInt(e.target.value, 1, 6);
                                                    setClassDisplaySetting(prev => ({
                                                        ...(prev || { mode: 'lastN', lastN: 2 }),
                                                        mode: 'lastN',
                                                        lastN: nextN,
                                                    }));
                                                }}
                                                className="w-24 p-2 border rounded-lg"
                                            />
                                            <span className="text-sm text-gray-500">示例：905 → 05，九（5）班 → 05</span>
                                        </div>
                                    )}

                                    {(classDisplaySetting?.mode || 'full') === 'inner' && (
                                        <span className="text-sm text-gray-500">示例：905 → 5，九（5）班 → 5</span>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50 hover:shadow-xl transition-shadow duration-300">
                            <h2 className="font-bold text-lg mb-3">班级信息输出</h2>
                            <div className="flex space-x-2 mt-4">
                                <button onClick={() => exportClassInfo('pdf')} disabled={isExporting} className={`flex-1 text-white px-4 py-2 rounded-lg flex items-center justify-center transition-all ${isExporting ? 'bg-gray-400' : 'bg-gradient-to-r from-red-500 to-rose-600 hover:shadow-lg'}`}>
                                    <icons.Download className="h-4 w-4 mr-2" />
                                    {isExporting ? '生成中...' : '导出 PDF'}
                                </button>
                                <button onClick={() => exportClassInfo('excel')} className="flex-1 bg-gradient-to-r from-emerald-500 to-green-600 text-white px-4 py-2 rounded-lg hover:shadow-lg transition-all flex items-center justify-center">
                                    <icons.Download className="h-4 w-4 mr-2" />
                                    导出 Excel
                                </button>
                            </div>
                        </div>
                        <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50 hover:shadow-xl transition-shadow duration-300">
                            <h2 className="font-bold text-lg mb-3">考场编排输出</h2>
                            <div className="flex space-x-2 mt-4">
                                <button onClick={() => exportClassroomLayout('pdf')} disabled={isExporting} className={`flex-1 text-white px-4 py-2 rounded-lg flex items-center justify-center transition-all ${isExporting ? 'bg-gray-400' : 'bg-gradient-to-r from-red-500 to-rose-600 hover:shadow-lg'}`}>
                                    <icons.Download className="h-4 w-4 mr-2" />
                                    {isExporting ? '生成中...' : '导出 PDF'}
                                </button>
                                <button onClick={() => exportClassroomLayout('excel')} className="flex-1 bg-gradient-to-r from-emerald-500 to-green-600 text-white px-4 py-2 rounded-lg hover:shadow-lg transition-all flex items-center justify-center">
                                    <icons.Download className="h-4 w-4 mr-2" />
                                    导出 Excel
                                </button>
                            </div>
                        </div>
                        <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50 hover:shadow-xl transition-shadow duration-300">
                            <h2 className="font-bold text-lg mb-3">校内考试输出 (Excel)</h2>
                            <button onClick={exportForInternal} className="bg-gradient-to-r from-orange-400 to-amber-500 text-white px-4 py-2 rounded-lg hover:shadow-lg transition-all w-full flex items-center justify-center">
                                <icons.Download className="h-4 w-4 mr-2" />
                                生成校内统计表
                            </button>
                        </div>
                        <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50 hover:shadow-xl transition-shadow duration-300">
                            <h2 className="font-bold text-lg mb-3">教育局统考输出 (Excel)</h2>
                            <div className="mb-3">
                                <label className="text-sm text-gray-700 font-medium mr-2">考场号模式</label>
                                <select value={bureauRoomNoMode} onChange={(e) => setBureauRoomNoMode(e.target.value)} className="w-full p-2 border rounded-lg mt-1">
                                    <option value="default">默认模式（沿用系统考场号）</option>
                                    <option value="byClassroomName">按考场名称输出（第+考场名称+考场）</option>
                                </select>
                            </div>
                            <button onClick={exportForBureau} className="bg-gradient-to-r from-indigo-500 to-violet-600 text-white px-4 py-2 rounded-lg hover:shadow-lg transition-all w-full flex items-center justify-center">
                                <icons.Download className="h-4 w-4 mr-2" />
                                生成教育局上报表
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
