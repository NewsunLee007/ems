                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const InvigilatorArrange = ({ invTeachers, invRooms, invExams, invResult, setInvResult, invWarnings, setInvWarnings }) => {
            const [selectedTeacherIds, setSelectedTeacherIds] = useState([]);
            const [selectedRoomIds, setSelectedRoomIds] = useState([]);
            const [selectedExamIds, setSelectedExamIds] = useState([]);
            const [teacherGradeFilter, setTeacherGradeFilter] = useState('all');
            const [teacherSubjectFilter, setTeacherSubjectFilter] = useState('all');

            useEffect(() => {
                setSelectedTeacherIds(invTeachers.map(t => t.id));
            }, [invTeachers]);
            useEffect(() => {
                setSelectedRoomIds(invRooms.map(r => r.id));
            }, [invRooms]);
            useEffect(() => {
                setSelectedExamIds(invExams.map(e => e.id));
            }, [invExams]);

            const runArrange = () => {
                if (invTeachers.length === 0 || invRooms.length === 0 || invExams.length === 0) {
                    alert('请先完善教师、考场和考试场次数据。');
                    return;
                }
                const teachers = invTeachers
                    .filter(t => selectedTeacherIds.includes(t.id))
                    .filter(t => String(t.name || '').trim() && String(t.subject || '').trim())
                    .map(t => ({ ...t, assignedCount: 0 }));
                const sessions = [...invExams].sort((a, b) => {
                    const ta = toDate(a.startTime)?.getTime() || 0;
                    const tb = toDate(b.startTime)?.getTime() || 0;
                    return ta - tb;
                }).filter(s => selectedExamIds.includes(s.id));
                const rooms = [...invRooms]
                    .filter(r => selectedRoomIds.includes(r.id))
                    .sort((a, b) => String(a.roomNo).localeCompare(String(b.roomNo), 'zh-Hans-CN'));
                if (teachers.length === 0 || sessions.length === 0 || rooms.length === 0) {
                    alert('请至少选择教师、考试场次和考场后再编排。');
                    return;
                }
                const teacherSlots = {};
                const result = [];
                const warnings = [];

                sessions.forEach(session => {
                    const sStart = toDate(session.startTime);
                    const sEnd = toDate(session.endTime);
                    if (!sStart || !sEnd || sEnd <= sStart) {
                        warnings.push(`${session.examName}-${session.subject} 时间格式不合法`);
                        return;
                    }
                    rooms.forEach(room => {
                        const need = Math.max(1, Number(room.requiredInvigilators) || 1);
                        const picked = [];
                        for (let i = 0; i < need; i++) {
                            const candidates = teachers.filter(t => {
                                if (picked.some(p => p.id === t.id)) return false;
                                if (t.assignedCount >= Number(t.maxInvigilations || 0)) return false;
                                if (normalizeSubject(t.subject) === normalizeSubject(session.subject)) return false;
                                const assigned = teacherSlots[t.id] || [];
                                return !assigned.some(x => isTimeOverlap(sStart, sEnd, x.start, x.end));
                            });
                            if (candidates.length === 0) break;
                            candidates.sort((a, b) => {
                                if (a.assignedCount !== b.assignedCount) return a.assignedCount - b.assignedCount;
                                if (isCoreSubject(a.subject) !== isCoreSubject(b.subject)) return isCoreSubject(a.subject) ? 1 : -1;
                                return String(a.name).localeCompare(String(b.name), 'zh-Hans-CN');
                            });
                            const chosen = candidates[0];
                            chosen.assignedCount += 1;
                            (teacherSlots[chosen.id] ||= []).push({ start: sStart, end: sEnd });
                            picked.push(chosen);
                        }
                        if (picked.length < need) {
                            warnings.push(`${session.examName}-${session.subject}-${room.roomNo} 缺少 ${need - picked.length} 位监考教师`);
                        }
                        result.push({
                            id: `iv_${session.id}_${room.id}`,
                            sessionId: session.id,
                            examName: session.examName,
                            subject: session.subject,
                            startTime: session.startTime,
                            endTime: session.endTime,
                            roomNo: room.roomNo,
                            requiredInvigilators: need,
                            invigilatorIds: picked.map(p => p.id)
                        });
                    });
                });

                setInvWarnings(warnings);
                setInvResult(result);
                alert('监考编排完成');
            };

            const updateInvigilator = (recordId, idx, teacherId) => {
                setInvResult(prev => prev.map(r => {
                    if (r.id !== recordId) return r;
                    const next = [...r.invigilatorIds];
                    next[idx] = teacherId;
                    return { ...r, invigilatorIds: next };
                }));
            };

            const swapWithNext = (index) => {
                setInvResult(prev => {
                    if (index >= prev.length - 1) return prev;
                    const a = prev[index];
                    const b = prev[index + 1];
                    if (a.sessionId !== b.sessionId) return prev;
                    const copied = [...prev];
                    copied[index] = { ...a, invigilatorIds: [...b.invigilatorIds] };
                    copied[index + 1] = { ...b, invigilatorIds: [...a.invigilatorIds] };
                    return copied;
                });
            };

            const teacherOptions = (subject) => invTeachers.filter(t => normalizeSubject(t.subject) !== normalizeSubject(subject));
            const teacherGrades = Array.from(new Set(invTeachers.map(t => String(t.grade || '').trim()).filter(Boolean))).sort();
            const teacherSubjects = Array.from(new Set(invTeachers.map(t => normalizeSubject(t.subject)).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
            const filteredTeachersForSelect = invTeachers.filter(t => {
                if (teacherGradeFilter !== 'all' && String(t.grade || '').trim() !== teacherGradeFilter) return false;
                if (teacherSubjectFilter !== 'all' && normalizeSubject(t.subject) !== teacherSubjectFilter) return false;
                return true;
            });
            const toggleTeacher = (id) => setSelectedTeacherIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const toggleRoom = (id) => setSelectedRoomIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const toggleExam = (id) => setSelectedExamIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

            return (
                <div>
                    <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50 mb-6">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
                            <div className="bg-white/80 border border-slate-200 rounded-xl p-3">
                                <div className="flex items-center justify-between mb-2">
                                    <div className="font-semibold text-sm">选择考试场次</div>
                                    <div className="flex gap-1">
                                        <button onClick={() => setSelectedExamIds(invExams.map(e => e.id))} className="text-xs px-2 py-1 rounded bg-slate-100 hover:bg-slate-200">全选</button>
                                        <button onClick={() => setSelectedExamIds([])} className="text-xs px-2 py-1 rounded bg-slate-100 hover:bg-slate-200">清空</button>
                                    </div>
                                </div>
                                <div className="max-h-36 overflow-auto space-y-1">
                                    {invExams.map(exam => (
                                        <label key={exam.id} className="flex items-center gap-2 text-sm">
                                            <input type="checkbox" checked={selectedExamIds.includes(exam.id)} onChange={() => toggleExam(exam.id)} />
                                            <span>{exam.subject} {exam.startTime}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white/80 border border-slate-200 rounded-xl p-3">
                                <div className="flex items-center justify-between mb-2">
                                    <div className="font-semibold text-sm">选择考场</div>
                                    <div className="flex gap-1">
                                        <button onClick={() => setSelectedRoomIds(invRooms.map(r => r.id))} className="text-xs px-2 py-1 rounded bg-slate-100 hover:bg-slate-200">全选</button>
                                        <button onClick={() => setSelectedRoomIds([])} className="text-xs px-2 py-1 rounded bg-slate-100 hover:bg-slate-200">清空</button>
                                    </div>
                                </div>
                                <div className="max-h-36 overflow-auto space-y-1">
                                    {invRooms.map(room => (
                                        <label key={room.id} className="flex items-center gap-2 text-sm">
                                            <input type="checkbox" checked={selectedRoomIds.includes(room.id)} onChange={() => toggleRoom(room.id)} />
                                            <span>{room.roomNo}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white/80 border border-slate-200 rounded-xl p-3">
                                <div className="flex items-center justify-between mb-2">
                                    <div className="font-semibold text-sm">选择教师</div>
                                    <div className="flex gap-1">
                                        <button onClick={() => setSelectedTeacherIds(filteredTeachersForSelect.map(t => t.id))} className="text-xs px-2 py-1 rounded bg-slate-100 hover:bg-slate-200">全选筛选项</button>
                                        <button onClick={() => setSelectedTeacherIds([])} className="text-xs px-2 py-1 rounded bg-slate-100 hover:bg-slate-200">清空</button>
                                    </div>
                                </div>
                                <div className="flex gap-2 mb-2">
                                    <select value={teacherGradeFilter} onChange={(e) => setTeacherGradeFilter(e.target.value)} className="p-1.5 border rounded text-sm">
                                        <option value="all">全部年级</option>
                                        {teacherGrades.map(g => <option key={g} value={g}>{g}</option>)}
                                    </select>
                                    <select value={teacherSubjectFilter} onChange={(e) => setTeacherSubjectFilter(e.target.value)} className="p-1.5 border rounded text-sm">
                                        <option value="all">全部学科</option>
                                        {teacherSubjects.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div className="max-h-28 overflow-auto space-y-1">
                                    {filteredTeachersForSelect.map(t => (
                                        <label key={t.id} className="flex items-center gap-2 text-sm">
                                            <input type="checkbox" checked={selectedTeacherIds.includes(t.id)} onChange={() => toggleTeacher(t.id)} />
                                            <span>{t.name}（{t.subject}）</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="text-gray-700 mb-4">规则：同科回避、同时间不冲突、不超个人上限，优先安排次数较少教师。</div>
                        <button onClick={runArrange} className="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-6 py-3 rounded-xl hover:from-purple-700 hover:to-pink-700">开始监考编排</button>
                        {invWarnings.length > 0 && (
                            <div className="mt-4 bg-amber-50 border border-amber-200 rounded-lg p-4">
                                <div className="font-semibold mb-2">编排提示</div>
                                <ul className="list-disc pl-6 text-sm text-amber-800">
                                    {invWarnings.map((w, i) => <li key={i}>{w}</li>)}
                                </ul>
                            </div>
                        )}
                    </div>

                    {invResult.length > 0 && (
                        <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50">
                            <h2 className="text-xl font-bold mb-4">监考结果微调</h2>
                            <div className="overflow-x-auto">
                                <table className="min-w-full bg-white">
                                    <thead className="bg-gray-100">
                                        <tr>
                                            {['考试', '学科', '时间', '考场', '监考安排', '调位'].map(h => <th key={h} className="text-left py-3 px-4 font-medium text-gray-600">{h}</th>)}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {invResult.map((r, idx) => (
                                            <tr key={r.id} className="border-b align-top">
                                                <td className="py-3 px-4">{r.examName}</td>
                                                <td className="py-3 px-4">{r.subject}</td>
                                                <td className="py-3 px-4 text-sm">{r.startTime} ~ {r.endTime}</td>
                                                <td className="py-3 px-4">{r.roomNo}</td>
                                                <td className="py-3 px-4">
                                                    <div className="space-y-2">
                                                        {Array.from({ length: r.requiredInvigilators }).map((_, i) => (
                                                            <select
                                                                key={`${r.id}_${i}`}
                                                                value={r.invigilatorIds[i] || ''}
                                                                onChange={(e) => updateInvigilator(r.id, i, e.target.value)}
                                                                className="w-64 p-2 border rounded-md"
                                                            >
                                                                <option value="">未分配</option>
                                                                {teacherOptions(r.subject).map(t => (
                                                                    <option key={t.id} value={t.id}>{t.name}（{t.subject}）</option>
                                                                ))}
                                                            </select>
                                                        ))}
                                                    </div>
                                                </td>
                                                <td className="py-3 px-4">
                                                    <button onClick={() => swapWithNext(idx)} className="text-blue-500 hover:text-blue-700">与下一考场互换</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const InvigilatorExport = ({ invResult, invTeachers, invRoles, invExamTitle }) => {
            const teacherMap = useMemo(() => {
                const map = new Map();
                invTeachers.forEach(t => map.set(t.id, t));
                return map;
            }, [invTeachers]);

            const exportExcel = () => {
                if (invResult.length === 0) {
                    alert('暂无监考编排结果');
                    return;
                }
                const rows = invResult.map(r => ({
                    '考试名称': r.examName,
                    '学科': r.subject,
                    '开始时间': r.startTime,
                    '结束时间': r.endTime,
                    '考场': r.roomNo,
                    '监考安排': r.invigilatorIds.map(id => teacherMap.get(id)?.name || '未分配').join('、')
                }));
                const statsMap = {};
                invResult.forEach(r => {
                    r.invigilatorIds.forEach(id => {
                        if (!id) return;
                        statsMap[id] = (statsMap[id] || 0) + 1;
                    });
                });
                const statRows = invTeachers.map(t => ({
                    '姓名': t.name,
                    '学科': t.subject,
                    '已安排次数': statsMap[t.id] || 0,
                    '次数上限': Number(t.maxInvigilations || 0)
                }));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), '监考总表');
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(statRows), '教师统计');
                XLSX.writeFile(wb, `${invExamTitle || '监考编排'}-监考安排.xlsx`);
            };

            const exportPDF = async () => {
                if (invResult.length === 0) {
                    alert('暂无监考编排结果');
                    return;
                }
                const rows = invResult.map(r => ({
                    time: `${r.startTime} ~ ${r.endTime}`,
                    examName: r.examName,
                    subject: r.subject,
                    roomNo: r.roomNo,
                    teachers: r.invigilatorIds.map(id => teacherMap.get(id)?.name || '未分配').join('、')
                }));
                const wrapper = document.createElement('div');
                wrapper.style.position = 'fixed';
                wrapper.style.left = '-10000px';
                wrapper.style.top = '-10000px';
                wrapper.style.width = '1280px';
                wrapper.style.backgroundColor = '#fff';
                wrapper.style.padding = '28px';
                wrapper.style.fontFamily = '"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif';
                wrapper.innerHTML = `
                    <div style="font-size:30px;font-weight:700;text-align:center;margin-bottom:10px;">${invExamTitle || '监考编排表'}</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;font-size:14px;">
                        <div>主考：${invRoles.chief || '未设置'}</div>
                        <div>副主考：${invRoles.viceChief || '未设置'}</div>
                        <div>考务组员：${invRoles.affairsTeam || '未设置'}</div>
                        <div>司号：${invRoles.signaler || '未设置'}</div>
                        <div>试卷扫描：${invRoles.scanner || '未设置'}</div>
                        <div>考务室：${invRoles.affairsOffice || '未设置'}</div>
                    </div>
                    <table style="width:100%;border-collapse:collapse;font-size:13px;">
                        <thead>
                            <tr style="background:#eef2ff;">
                                <th style="border:1px solid #cbd5e1;padding:8px;">时间</th>
                                <th style="border:1px solid #cbd5e1;padding:8px;">考试名称</th>
                                <th style="border:1px solid #cbd5e1;padding:8px;">学科</th>
                                <th style="border:1px solid #cbd5e1;padding:8px;">考场</th>
                                <th style="border:1px solid #cbd5e1;padding:8px;">监考安排</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows.map(r => `
                                <tr>
                                    <td style="border:1px solid #cbd5e1;padding:8px;">${r.time}</td>
                                    <td style="border:1px solid #cbd5e1;padding:8px;">${r.examName}</td>
                                    <td style="border:1px solid #cbd5e1;padding:8px;">${r.subject}</td>
                                    <td style="border:1px solid #cbd5e1;padding:8px;">${r.roomNo}</td>
                                    <td style="border:1px solid #cbd5e1;padding:8px;">${r.teachers}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.body.appendChild(wrapper);
                const canvas = await html2canvas(wrapper, { scale: 1.4, useCORS: true, backgroundColor: '#ffffff' });
                document.body.removeChild(wrapper);
                const img = canvas.toDataURL('image/jpeg', 0.78);
                const doc = new jspdf.jsPDF('l', 'mm', 'a4');
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                doc.addImage(img, 'JPEG', 0, 0, pageWidth, pageHeight, undefined, 'MEDIUM');
                doc.save(`${invExamTitle || '监考编排'}-监考安排.pdf`);
            };

            return (
                <div>
                    <div className="grid grid-cols-1 gap-6">
                        <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50">
                            <h2 className="font-bold text-lg mb-3">监考安排导出</h2>
                            <div className="space-y-3">
                                <button onClick={exportPDF} className="w-full bg-gradient-to-r from-red-500 to-rose-600 text-white px-4 py-2 rounded-lg hover:shadow-lg">导出 PDF</button>
                                <button onClick={exportExcel} className="w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white px-4 py-2 rounded-lg hover:shadow-lg">导出 Excel</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main Application ---
        const App = () => {
            const [currentView, setCurrentView] = useState('examSettings');
            const [activeSystem, setActiveSystem] = useState('base');
            const [isLoading, setIsLoading] = useState(false); // No backend loading needed initially
            const [history, setHistory] = useState([]); // Store saved exam history
            
            const [examSettings, setExamSettings] = useState({
                schoolYear: '2025',
                term: '1',
                examName: '期中模拟考试',
                examType: '校内考试',
                examSubType: '月考',
                customSubType: '',
            });
            const [examSessions, setExamSessions] = useState(buildDefaultExamSessions);

            const [classrooms, setClassrooms] = useState([
                { id: 'c1', grade: '7', name: '物理实验室', number: '第01考场', capacity: 30, layout: '5', layoutDetail: '6,6,6,6,6' },
                { id: 'c2', grade: '7', name: '化学实验室', number: '第02考场', capacity: 30, layout: '5', layoutDetail: '6,6,6,6,6' },
                { id: 'c3', grade: '8', name: '阶梯教室(东)', number: '第03考场', capacity: 40, layout: '6', layoutDetail: '7,7,6,7,7,6' },
            ]);

            const [students, setStudents] = useState([
                { id: 's1', grade: '7', studentId: 'G440101201207010001', class: '701', classSeat: '1', name: '张三', category: '1', special: false },
                { id: 's2', grade: '7', studentId: 'G440101201207010002', class: '701', classSeat: '2', name: '李四', category: '1', special: false },
                { id: 's3', grade: '7', studentId: 'G440101201207020001', class: '702', classSeat: '1', name: '王五', category: '2', special: false },
                { id: 's4', grade: '7', studentId: 'G440101201207020002', class: '702', classSeat: '2', name: '赵六', category: '2', special: true },
            ]);

            const [examNumberRule, setExamNumberRule] = useState([
                { id: 'r1', name: '学年', source: 'schoolYear', length: 2, value: '' },
                { id: 'r2', name: '学期', source: 'term', length: 2, value: '' },
                { id: 'r5', name: '班级', source: 'class', length: 2, value: '' },
                { id: 'r3', name: '考场号', source: 'classroomNumber', length: 2, value: '' },
                { id: 'r4', name: '座位号', source: 'seatNumber', length: 2, value: '' },
            ]);

            const [arrangementResult, setArrangementResult] = useState([]);
            const [useImportedExamNumber, setUseImportedExamNumber] = useState(false);
            const [classDisplaySetting, setClassDisplaySetting] = useState({ mode: 'full', lastN: 2 });
            const [invTeachers, setInvTeachers] = useState([]);
            const [invResult, setInvResult] = useState([]);
            const [invWarnings, setInvWarnings] = useState([]);
            const [invDefaultLimit, setInvDefaultLimit] = useState(2);
            const [invRoles, setInvRoles] = useState(DEFAULT_INV_ROLES);
            const apiBase = window.location.port === '3000' ? '' : `${window.location.protocol}//${window.location.hostname}:3000`;
            const backendAuthRequired = false;
            const [authToken, setAuthToken] = useState(localStorage.getItem(AUTH_TOKEN_KEY) || '');
            const [currentUser, setCurrentUser] = useState(null);
            const [authChecking, setAuthChecking] = useState(backendAuthRequired);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });

            // Load history on mount
            const buildPayload = useCallback(() => ({
                examSettings,
                examSessions,
                classrooms,
                students,
                examNumberRule,
                useImportedExamNumber,
                classDisplaySetting,
                arrangementResult,
                invTeachers,
                invResult,
                invWarnings,
                invDefaultLimit,
                invRoles
            }), [examSettings, examSessions, classrooms, students, examNumberRule, useImportedExamNumber, classDisplaySetting, arrangementResult, invTeachers, invResult, invWarnings, invDefaultLimit, invRoles]);

            const normalizeHistoryItem = useCallback((item) => {
                const source = item && typeof item === 'object' ? item : {};
                const sourcePayload = source.payload && typeof source.payload === 'object'
                    ? source.payload
                    : {
                        examSettings: source.examSettings,
                        examSessions: source.examSessions,
                        classrooms: source.classrooms,
                        students: source.students,
                        examNumberRule: source.examNumberRule,
                        useImportedExamNumber: source.useImportedExamNumber,
                        classDisplaySetting: source.classDisplaySetting,
                        arrangementResult: source.arrangementResult,
                        invTeachers: source.invTeachers,
                        invResult: source.invResult,
                        invWarnings: source.invWarnings,
                        invDefaultLimit: source.invDefaultLimit,
                        invRoles: source.invRoles
                    };
                const payload = {
                    examSettings: sourcePayload.examSettings,
                    examSessions: Array.isArray(sourcePayload.examSessions) ? sourcePayload.examSessions : [],
                    classrooms: Array.isArray(sourcePayload.classrooms) ? sourcePayload.classrooms : [],
                    students: Array.isArray(sourcePayload.students) ? sourcePayload.students : [],
                    examNumberRule: Array.isArray(sourcePayload.examNumberRule) ? sourcePayload.examNumberRule : [],
                    useImportedExamNumber: !!sourcePayload.useImportedExamNumber,
                    classDisplaySetting: sourcePayload.classDisplaySetting && typeof sourcePayload.classDisplaySetting === 'object' ? sourcePayload.classDisplaySetting : { mode: 'full', lastN: 2 },
                    arrangementResult: Array.isArray(sourcePayload.arrangementResult) ? sourcePayload.arrangementResult : [],
                    invTeachers: Array.isArray(sourcePayload.invTeachers) ? sourcePayload.invTeachers : [],
                    invResult: Array.isArray(sourcePayload.invResult) ? sourcePayload.invResult : [],
                    invWarnings: Array.isArray(sourcePayload.invWarnings) ? sourcePayload.invWarnings : [],
                    invDefaultLimit: Number.isFinite(Number(sourcePayload.invDefaultLimit)) ? Number(sourcePayload.invDefaultLimit) : 2,
                    invRoles: sourcePayload.invRoles && typeof sourcePayload.invRoles === 'object' ? { ...DEFAULT_INV_ROLES, ...sourcePayload.invRoles } : { ...DEFAULT_INV_ROLES }
                };
                const examName = String(source.examName || payload.examSettings?.examName || '未命名考试');
                return {
                    id: source.id || Date.now() + Math.floor(Math.random() * 1000000),
                    saveTime: source.saveTime || new Date().toLocaleString(),
                    version: Number(source.version) || 1,
                    examName,
                    payload
                };
            }, []);

            useEffect(() => {
                const currentRaw = localStorage.getItem(HISTORY_STORAGE_KEY);
                const legacyRaw = localStorage.getItem(LEGACY_HISTORY_STORAGE_KEY);
                const raw = currentRaw || legacyRaw;
                if (!raw) return;
                try {
                    const parsed = JSON.parse(raw);
                    const normalized = (Array.isArray(parsed) ? parsed : [])
                        .map(normalizeHistoryItem)
                        .sort((a, b) => Number(b.id) - Number(a.id));
                    setHistory(normalized);
                    localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(normalized));
                    if (legacyRaw) {
                        localStorage.removeItem(LEGACY_HISTORY_STORAGE_KEY);
                    }
                } catch (e) {
                    localStorage.removeItem(HISTORY_STORAGE_KEY);
                }
            }, [normalizeHistoryItem]);

            useEffect(() => {
                if (!backendAuthRequired) {
                    setAuthChecking(false);
                    return;
                }
                if (!authToken) {
                    setAuthChecking(false);
                    return;
                }
                const run = async () => {
                    try {
                        const res = await fetch(`${apiBase}/api/auth/me`, { headers: { 'x-auth-token': authToken } });
                        if (!res.ok) throw new Error('unauthorized');
                        const data = await res.json();
                        setCurrentUser(data.user);
                    } catch (e) {
                        localStorage.removeItem(AUTH_TOKEN_KEY);
                        setAuthToken('');
                        setCurrentUser(null);
                    } finally {
                        setAuthChecking(false);
                    }
                };
                run();
            }, [authToken, backendAuthRequired, apiBase]);

            const saveData = useCallback(() => {
                const payload = buildPayload();
                const saveName = payload.examSettings?.examName || '未命名考试';
                const currentData = {
                    id: Date.now(),
                    saveTime: new Date().toLocaleString(),
                    version: HISTORY_VERSION,
                    examName: saveName,
                    payload
                };
                const newHistory = [currentData, ...history.filter(h => (h.examName || h.payload?.examSettings?.examName) !== saveName)];
                setHistory(newHistory);
                localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(newHistory));
                alert(`数据已保存！\n考试名称：${saveName}\n已完整保存考场编排与监考编排数据。`);
            }, [buildPayload, history]);

            const applyPayload = (payload) => {
                if (!payload || typeof payload !== 'object') return;
                if (payload.examSettings && typeof payload.examSettings === 'object') setExamSettings(payload.examSettings);
                if (Array.isArray(payload.examSessions)) setExamSessions(payload.examSessions);
                if (Array.isArray(payload.classrooms)) setClassrooms(payload.classrooms);
                if (Array.isArray(payload.students)) setStudents(payload.students);
                if (Array.isArray(payload.examNumberRule)) setExamNumberRule(payload.examNumberRule);
                setUseImportedExamNumber(!!payload.useImportedExamNumber);
                if (payload.classDisplaySetting && typeof payload.classDisplaySetting === 'object') setClassDisplaySetting(payload.classDisplaySetting);
                if (Array.isArray(payload.arrangementResult)) setArrangementResult(payload.arrangementResult);
                if (Array.isArray(payload.invTeachers)) setInvTeachers(payload.invTeachers);
                if (Array.isArray(payload.invResult)) setInvResult(payload.invResult);
                if (Array.isArray(payload.invWarnings)) setInvWarnings(payload.invWarnings);
                if (Number.isFinite(Number(payload.invDefaultLimit))) setInvDefaultLimit(Number(payload.invDefaultLimit));
                setInvRoles(payload.invRoles && typeof payload.invRoles === 'object' ? { ...DEFAULT_INV_ROLES, ...payload.invRoles } : { ...DEFAULT_INV_ROLES });
            };

            const loadHistoryItem = (item) => {
                const normalized = normalizeHistoryItem(item);
                const targetName = normalized.examName || '未命名考试';
                if (window.confirm(`确定要加载 "${targetName}" 的存档吗？\n当前未保存的修改将会丢失。`)) {
                    applyPayload(normalized.payload);
                    alert('存档加载成功，考场编排与监考编排均已恢复。');
                }
            };

            const deleteHistoryItem = (e, id) => {
                e.stopPropagation();
                if (window.confirm("确定要删除这条历史记录吗？")) {
                    const newHistory = history.filter(h => h.id !== id);
                    setHistory(newHistory);
                    localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(newHistory));
                }
            };

            const saveCloudData = async () => {
                try {
                    const res = await fetch(`${apiBase}/api/save-all`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', ...(authToken ? { 'x-auth-token': authToken } : {}) },
                        body: JSON.stringify({ payload: buildPayload() }),
                    });
                    if (!res.ok) throw new Error('云端保存失败');
                    alert('云端保存成功');
                } catch (e) {
                    alert(`云端保存失败：${e.message}`);
                }
            };

            const loadCloudData = async () => {
                try {
                    const res = await fetch(`${apiBase}/api/load-latest`, { headers: authToken ? { 'x-auth-token': authToken } : {} });
                    if (!res.ok) throw new Error('云端读取失败');
                    const json = await res.json();
                    applyPayload(json.payload);
                    alert('云端数据加载成功');
                } catch (e) {
                    alert(`云端读取失败：${e.message}`);
                }
            };

            const baseViews = ['examSettings', 'classroomInfo', 'studentInfo', 'invData'];
            const seatViews = ['examNumberRule', 'arrange', 'printExport'];
            const invViews = ['invArrange', 'invExport'];
            const sharedInvRooms = useMemo(() => classrooms.map(c => ({
                id: c.id,
                name: c.name,
                roomNo: c.number,
                requiredInvigilators: 2
            })), [classrooms]);
            const sharedInvExams = useMemo(() => examSessions.map(s => ({
                id: s.id,
                examName: examSettings.examName,
                subject: s.subject,
                startTime: s.startTime,
                endTime: s.endTime
            })), [examSessions, examSettings.examName]);
            const invExamTitle = `${examSettings.examName || '未命名考试'}监考编排`;

            useEffect(() => {
                if (currentView === 'history') {
                    return;
                }
                if (activeSystem === 'base' && !baseViews.includes(currentView)) {
                    setCurrentView('examSettings');
                }
                if (activeSystem === 'seat' && !seatViews.includes(currentView)) {
                    setCurrentView('examNumberRule');
                }
                if (activeSystem === 'inv' && !invViews.includes(currentView)) {
                    setCurrentView('invArrange');
                }
            }, [activeSystem, currentView]);

            const renderView = () => {
                switch (currentView) {
                    case 'examSettings': return <ExamSettings settings={examSettings} setSettings={setExamSettings} examSessions={examSessions} setExamSessions={setExamSessions} />;
                    case 'classroomInfo': return <ClassroomInfo classrooms={classrooms} setClassrooms={setClassrooms} />;
                    case 'studentInfo': return <StudentInfo students={students} setStudents={setStudents} />;
                    case 'examNumberRule': return <ExamNumberRule rule={examNumberRule} setRule={setExamNumberRule} useImportedExamNumber={useImportedExamNumber} setUseImportedExamNumber={setUseImportedExamNumber} />;
                    case 'arrange': return <ArrangementEngine students={students} classrooms={classrooms} examSessions={examSessions} examSettings={examSettings} examNumberRule={examNumberRule} useImportedExamNumber={useImportedExamNumber} arrangementResult={arrangementResult} setArrangementResult={setArrangementResult} classDisplaySetting={classDisplaySetting} />;
                    case 'printExport': return <PrintAndExport arrangementResult={arrangementResult} examSettings={examSettings} classrooms={classrooms} classDisplaySetting={classDisplaySetting} setClassDisplaySetting={setClassDisplaySetting} />;
                    case 'history': return <HistoryView history={history} onLoad={loadHistoryItem} onDelete={deleteHistoryItem} />;
                    case 'invData': return <InvigilatorData invTeachers={invTeachers} setInvTeachers={setInvTeachers} sharedRooms={sharedInvRooms} sharedExams={sharedInvExams} invDefaultLimit={invDefaultLimit} setInvDefaultLimit={setInvDefaultLimit} invRoles={invRoles} setInvRoles={setInvRoles} currentUser={currentUser} authToken={authToken} apiBase={apiBase} />;
                    case 'invArrange': return <InvigilatorArrange invTeachers={invTeachers} invRooms={sharedInvRooms} invExams={sharedInvExams} invResult={invResult} setInvResult={setInvResult} invWarnings={invWarnings} setInvWarnings={setInvWarnings} />;
                    case 'invExport': return <InvigilatorExport invResult={invResult} invTeachers={invTeachers} invRoles={invRoles} invExamTitle={invExamTitle} />;
                    default: return <ExamSettings settings={examSettings} setSettings={setExamSettings} examSessions={examSessions} setExamSessions={setExamSessions} />;
                }
            };
            
            if (isLoading) {
                return <div className="flex justify-center items-center h-screen">正在加载数据...</div>;
            }

            const handleLogin = async () => {
                try {
                    const res = await fetch(`${apiBase}/api/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(loginForm),
                    });
                    if (!res.ok) throw new Error('账号或密码错误');
                    const data = await res.json();
                    setAuthToken(data.token);
                    setCurrentUser(data.user);
                    localStorage.setItem(AUTH_TOKEN_KEY, data.token);
                } catch (e) {
                    alert(`登录失败：${e.message}`);
                }
            };

            const logout = () => {
                localStorage.removeItem(AUTH_TOKEN_KEY);
                setAuthToken('');
                setCurrentUser(null);
            };

            if (backendAuthRequired && authChecking) {
                return <div className="h-screen flex items-center justify-center text-slate-600">正在校验登录状态...</div>;
            }

            if (backendAuthRequired && !authToken) {
                return (
                    <div className="h-screen flex items-center justify-center bg-[radial-gradient(circle_at_20%_10%,#dbeafe_0%,#eef2ff_35%,#f8fafc_100%)]">
                        <div className="w-full max-w-md bg-white/70 backdrop-blur-xl border border-white/70 rounded-2xl p-8 shadow-xl">
                            <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">EMS 系统登录</h2>
                            <div className="space-y-4">
                                <input value={loginForm.username} onChange={(e) => setLoginForm(prev => ({ ...prev, username: e.target.value }))} placeholder="账号" className="w-full p-3 border rounded-xl" />
                                <input type="password" value={loginForm.password} onChange={(e) => setLoginForm(prev => ({ ...prev, password: e.target.value }))} placeholder="密码" className="w-full p-3 border rounded-xl" />
                                <button onClick={handleLogin} className="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-700 text-white font-semibold">登录系统</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-[radial-gradient(circle_at_20%_10%,#dbeafe_0%,#eef2ff_28%,#f8fafc_60%,#f1f5f9_100%)] font-sans">
                    <Sidebar currentView={currentView} setCurrentView={setCurrentView} onSave={saveData} onCloudSave={saveCloudData} onCloudLoad={loadCloudData} onLogout={logout} currentUser={currentUser} activeSystem={activeSystem} setActiveSystem={setActiveSystem} />
                    <main className="flex-1 p-5 overflow-y-auto">
                        <div className="max-w-[1380px] mx-auto">
                            <TopTabs activeSystem={activeSystem} currentView={currentView} setCurrentView={setCurrentView} />
                            {renderView()}
                        </div>
                    </main>
                </div>
            );
        };

        const TopTabs = ({ activeSystem, currentView, setCurrentView }) => {
            const tabs = {
                base: [
                    { id: 'examSettings', label: '考试设定' },
                    { id: 'classroomInfo', label: '考场信息' },
                    { id: 'studentInfo', label: '考生信息' },
                    { id: 'invData', label: '教师与岗位' },
                ],
                seat: [
                    { id: 'examNumberRule', label: '考号规则' },
                    { id: 'arrange', label: '一键编排' },
                    { id: 'printExport', label: '打印输出' },
                ],
                inv: [
                    { id: 'invArrange', label: '监考编排' },
                    { id: 'invExport', label: '监考导出' },
                ]
            };
            const currentTabs = tabs[activeSystem] || [];
            return (
                <div className="mb-5 bg-white/65 backdrop-blur-xl rounded-2xl border border-white/70 shadow-sm p-3">
                    <div className="flex flex-wrap gap-2">
                        {currentTabs.map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setCurrentView(tab.id)}
                                className={`px-4 py-2.5 rounded-xl text-sm font-semibold transition-all ${
                                    currentView === tab.id
                                        ? 'bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow'
                                        : 'bg-white/80 text-slate-700 hover:bg-white'
                                }`}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const Sidebar = ({ currentView, setCurrentView, onSave, onCloudSave, onCloudLoad, onLogout, currentUser, activeSystem, setActiveSystem }) => {
            const systems = [
                { id: 'base', label: '基础信息' },
                { id: 'seat', label: '考场编排' },
                { id: 'inv', label: '监考编排' },
            ];

            return (
                <nav className="w-52 bg-white/55 backdrop-blur-2xl border-r border-white/60 shadow-xl z-10 p-3 flex flex-col">
                    <div className="flex items-center mb-8 px-2">
                        <img src="https://p.ipic.vip/lhgb6n.png" alt="Logo" className="h-9 w-9 mr-2"/>
                        <h1 className="text-base leading-5 font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-purple-700">EMS 教务编排</h1>
                    </div>
                    <div className="grid grid-cols-1 gap-2 mb-4">
                        {systems.map(system => (
                            <button
                                key={system.id}
                                onClick={() => setActiveSystem(system.id)}
                                className={`w-full text-center px-3 py-3 rounded-xl text-sm font-semibold transition-all ${
                                    activeSystem === system.id
                                        ? 'bg-gradient-to-r from-indigo-700 to-purple-700 text-white shadow'
                                        : 'bg-white/85 text-slate-700 hover:bg-white'
                                }`}
                            >
                                {system.label}
                            </button>
                        ))}
                    </div>
                    <button
                        onClick={() => setCurrentView('history')}
                        className={`w-full text-center px-3 py-2.5 rounded-xl text-sm font-semibold transition-all mb-4 ${
                            currentView === 'history'
                                ? 'bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow'
                                : 'bg-white/85 text-slate-700 hover:bg-white'
                        }`}
                    >
                        历史记录
                    </button>
                    <div className="flex-1"></div>
                    <div className="mt-auto rounded-2xl bg-white/60 backdrop-blur-xl border border-white/60 p-2 space-y-2">
                        <div className="text-xs font-semibold text-slate-500 px-1">数据中心</div>
                        {currentUser?.username && (
                            <div className="text-xs text-slate-600 px-1">当前用户：{currentUser.username}</div>
                        )}
                        <button onClick={onSave} className="w-full flex items-center justify-center p-3 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-700 text-white hover:shadow-lg transition-all">
                            <icons.Save className="h-5 w-5 mr-3" />
                            <span className="font-bold">保存全部数据</span>
                        </button>
                        <button onClick={onCloudSave} className="w-full py-2.5 rounded-xl bg-indigo-600 text-white hover:bg-indigo-700 font-medium">云端保存</button>
                        <button onClick={onCloudLoad} className="w-full py-2.5 rounded-xl bg-white text-slate-700 border border-slate-200 hover:bg-slate-50 font-medium">云端读取</button>
                        {currentUser && (
                            <button onClick={onLogout} className="w-full py-2.5 rounded-xl bg-rose-50 text-rose-700 border border-rose-200 hover:bg-rose-100 font-medium">退出登录</button>
                        )}
                    </div>
                </nav>
            );
        };

        const HistoryView = ({ history, onLoad, onDelete }) => {
            return (
                <div>
                     <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50">
                        {history.length === 0 ? (
                            <div className="text-center text-gray-500 py-10">暂无历史记录</div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {history.map(item => (
                                    <div 
                                        key={item.id} 
                                        onClick={() => onLoad(item)}
                                        className="bg-white border border-gray-200 rounded-xl p-6 cursor-pointer hover:shadow-xl hover:border-blue-300 transition-all transform hover:-translate-y-1 relative group"
                                    >
                                        <div className="flex justify-between items-start mb-4">
                                            <h3 className="font-bold text-lg text-gray-800">{item.examName || item.payload?.examSettings?.examName || '未命名考试'}</h3>
                                            <button 
                                                onClick={(e) => onDelete(e, item.id)}
                                                className="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"
                                                title="删除记录"
                                            >
                                                <icons.Trash2 size={18} />
                                            </button>
                                        </div>
                                        <div className="text-sm text-gray-600 space-y-2">
                                            <p><span className="font-medium">保存时间:</span> {item.saveTime}</p>
                                            <p><span className="font-medium">学年学期:</span> {item.payload?.examSettings?.schoolYear} - {item.payload?.examSettings?.term}</p>
                                            <p><span className="font-medium">考场数量:</span> {item.payload?.classrooms?.length || 0}</p>
                                            <p><span className="font-medium">考生人数:</span> {item.payload?.students?.length || 0}</p>
                                            <p><span className="font-medium">座位已编排:</span> {(item.payload?.arrangementResult?.length || 0) > 0 ? '是' : '否'}</p>
                                            <p><span className="font-medium">监考已编排:</span> {(item.payload?.invResult?.length || 0) > 0 ? '是' : '否'}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                     </div>
                </div>
            );
        };

        const ExamSettings = ({ settings, setSettings, examSessions, setExamSessions }) => {
            const handleInputChange = (e) => {

                                            <td className="py-3 px-4 font-mono text-sm">{s.examNumber}</td>
                                            <td className="py-3 px-4">{s.class}</td>

                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
