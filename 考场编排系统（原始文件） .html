<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初中学校考试考场编排系统</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel to translate JSX in the browser -->

    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        // --- Destructure necessary components from global scope ---
        const { useState, useEffect, useCallback, useMemo } = React;
        
        // --- Embedded Base64 Font for PDF ---
        // This is a Base64 encoded string of a subset of the Noto Sans CJK font.
        // It is embedded directly to ensure Chinese characters render correctly in PDFs on any system.

        

        // --- Icon Components (replaces external lucide-react library) ---
        const icons = {
          Settings: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 0 2l-.15.08a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1 0-2l.15-.08a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" />
            </svg>
          ),
          Building: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="4" y="2" width="16" height="20" rx="2" ry="2" /><path d="M9 22v-4h6v4" /><path d="M8 6h.01" /><path d="M16 6h.01" /><path d="M12 6h.01" /><path d="M12 10h.01" /><path d="M12 14h.01" /><path d="M16 10h.01" /><path d="M16 14h.01" /><path d="M8 10h.01" /><path d="M8 14h.01" />
            </svg>
          ),
          Users: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          ),
          FileText: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><line x1="10" y1="9" x2="8" y2="9" />
            </svg>
          ),
          BookUser: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" /><circle cx="12" cy="8" r="2" /><path d="M15 13a3 3 0 1 0-6 0" />
            </svg>
          ),
          Printer: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect x="6" y="14" width="12" height="8" />
            </svg>
          ),
          Upload: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          ),
          Plus: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          ),
          Trash2: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 6h18" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" />
            </svg>
          ),
          Save: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" />
            </svg>
          ),
          Download: (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" />
            </svg>
          ),
          GripVertical: (props) => (
             <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle>
            </svg>
          )
        };

        // --- Firebase Configuration ---
        // 重要提示：请将下面的占位符替换为您自己的Firebase项目配置！
        // 您可以从Firebase控制台的项目设置中获取这些信息。
        // 如果不替换，数据将无法保存到云端。
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { 
            apiKey: "YOUR_API_KEY", 
            authDomain: "YOUR_AUTH_DOMAIN", 
            projectId: "YOUR_PROJECT_ID", 
            storageBucket: "YOUR_STORAGE_BUCKET", 
            messagingSenderId: "YOUR_SENDER_ID", 
            appId: "YOUR_APP_ID" 
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'exam-seating-default';

        // --- Firebase Initialization ---
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Helper Components ---
        const Modal = ({ isOpen, onClose, title, children }) => {
          if (!isOpen) return null;
          return (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex justify-center items-center">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl p-6 relative border border-gray-100 animate-fade-in-up">
                <h2 className="text-xl font-bold mb-4 text-gray-800">{title}</h2>
                <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                {children}
              </div>
            </div>
          );
        };

        const normalizeGrade = (value) => {
            const v = String(value ?? '').trim();
            if (!v) return '';

            const direct = v.match(/\d+/);
            if (direct) {
                const n = parseInt(direct[0], 10);
                if (n >= 7 && n <= 9) return String(n);
                if (n >= 700 && n <= 999) return String(Math.floor(n / 100));
                if (n === 1) return '7';
                if (n === 2) return '8';
                if (n === 3) return '9';
            }

            if (/(初一|七|一年级)/.test(v)) return '7';
            if (/(初二|八|二年级)/.test(v)) return '8';
            if (/(初三|九|三年级)/.test(v)) return '9';

            return v;
        };

        const formatGradeLabel = (value) => {
            const v = String(value ?? '').trim();
            if (!v) return '';
            if (v.includes('年级')) return v;
            return `${v}年级`;
        };

        const clampInt = (value, min, max) => {
            const n = typeof value === 'number' ? value : parseInt(String(value ?? ''), 10);
            if (!Number.isFinite(n)) return min;
            return Math.min(max, Math.max(min, n));
        };

        const extractDigits = (value) => {
            const v = String(value ?? '').trim();
            if (!v) return '';
            const m = v.match(/\d+/g);
            return m ? m.join('') : '';
        };

        const extractInnerClassNumber = (value) => {
            const v = String(value ?? '').trim();
            if (!v) return '';
            const m = v.match(/[（(]\s*(\d{1,6})\s*[)）]/);
            if (m) return m[1];
            const digits = extractDigits(v);
            return digits ? digits.slice(-1) : '';
        };

        const formatClassForOutput = (value, setting) => {
            const v = String(value ?? '').trim();
            if (!v) return '';

            const mode = setting?.mode || 'full';
            if (mode === 'full') return v;

            if (mode === 'inner') {
                const inner = extractInnerClassNumber(v);
                if (!inner) return v;
                const n = parseInt(inner, 10);
                return Number.isFinite(n) ? String(n) : inner;
            }

            if (mode === 'lastN') {
                const n = clampInt(setting?.lastN ?? 2, 1, 6);
                const digits = extractDigits(v) || extractInnerClassNumber(v);
                if (!digits) return v;
                return String(digits).slice(-n).padStart(n, '0');
            }

            return v;
        };

        const getLayoutSeatCount = (layoutDetail) => {
            const parts = String(layoutDetail ?? '')
                .split(',')
                .map(s => parseInt(String(s).trim(), 10))
                .filter(n => Number.isFinite(n) && n > 0);
            if (parts.length === 0) return 0;
            return parts.reduce((sum, n) => sum + n, 0);
        };

        const getClassroomEffectiveCapacity = (classroom) => {
            const layoutCount = getLayoutSeatCount(classroom?.layoutDetail);
            if (layoutCount > 0) return layoutCount;
            const cap = Number(classroom?.capacity);
            if (Number.isFinite(cap) && cap > 0) return cap;
            return 0;
        };

        const normalizeSubject = (value) => String(value ?? '').trim();
        const toDate = (value) => {
            const v = String(value ?? '').trim().replace(/\./g, '-').replace(/\//g, '-').replace('T', ' ');
            const d = new Date(v);
            return Number.isNaN(d.getTime()) ? null : d;
        };
        const isTimeOverlap = (aStart, aEnd, bStart, bEnd) => aStart < bEnd && bStart < aEnd;
        const subjectOrder = ['语文', '数学', '英语', '科学', '社会'];
        const isCoreSubject = (s) => subjectOrder.includes(normalizeSubject(s));
        const AUTH_TOKEN_KEY = 'ems_auth_token';
        const HISTORY_STORAGE_KEY = 'ems_full_history_v2';
        const LEGACY_HISTORY_STORAGE_KEY = 'examArrangementHistory';
        const HISTORY_VERSION = 2;
        const DEFAULT_INV_ROLES = {
            chief: '',
            viceChief: '',
            affairsTeam: '',
            signaler: '',
            scanner: '',
            affairsOffice: ''
        };
        const defaultSessionTemplate = [
            { subject: '语文', startTime: '2026-03-19T09:00', endTime: '2026-03-19T11:00' },
            { subject: '数学', startTime: '2026-03-19T13:30', endTime: '2026-03-19T15:30' },
            { subject: '英语', startTime: '2026-03-20T09:00', endTime: '2026-03-20T11:00' },
            { subject: '科学', startTime: '2026-03-20T13:30', endTime: '2026-03-20T15:00' },
            { subject: '社会', startTime: '2026-03-21T09:00', endTime: '2026-03-21T10:40' },
        ];
        const buildDefaultExamSessions = () => defaultSessionTemplate.map((s, idx) => ({
            id: `es_default_${idx + 1}`,
            subject: s.subject,
            startTime: s.startTime,
            endTime: s.endTime,
        }));

        const InvigilatorData = ({ invTeachers, setInvTeachers, sharedRooms, sharedExams, invDefaultLimit, setInvDefaultLimit, invRoles, setInvRoles, currentUser, authToken, apiBase }) => {
            const [userList, setUserList] = useState([]);
            const [newUser, setNewUser] = useState({ username: '', password: '', role: 'operator' });
            const parseSheet = (file, cb) => {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    cb(data);
                };
                reader.readAsBinaryString(file);
            };

            const importTeachers = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                parseSheet(file, (rows) => {
                    const head = (rows[0] || []).map(h => String(h || '').trim());
                    const nameIdx = head.findIndex(h => ['姓名'].includes(h));
                    const subjectIdx = head.findIndex(h => ['学科'].includes(h));
                    const gradeIdx = head.findIndex(h => ['年级'].includes(h));
                    const start = (nameIdx >= 0 || subjectIdx >= 0) ? 1 : 0;
                    const imported = rows.slice(start).map((r, i) => ({
                        id: `it_${Date.now()}_${i}`,
                        name: String(r[nameIdx >= 0 ? nameIdx : 2] || '').trim(),
                        subject: normalizeSubject(r[subjectIdx >= 0 ? subjectIdx : 0]),
                        grade: String(r[gradeIdx >= 0 ? gradeIdx : 1] || '').trim(),
                        maxInvigilations: 2
                    })).filter(x => x.name);
                    setInvTeachers(prev => [...prev, ...imported]);
                    alert(`已导入 ${imported.length} 位监考教师`);
                });
            };

            const downloadTeacherTemplate = () => {
                const headers = ['学科', '年级', '姓名', '次数上限'];
                const rows = [
                    ['语文', '九年级', '王老师', 2],
                    ['数学', '九年级', '陈老师', 2],
                    ['英语', '九年级', '李老师', 2],
                ];
                const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '教师导入模板');
                XLSX.writeFile(wb, '监考教师导入模板.xlsx');
            };

            const loadUsers = async () => {
                if (!authToken || currentUser?.role !== 'admin') return;
                try {
                    const res = await fetch(`${apiBase}/api/users`, { headers: { 'x-auth-token': authToken } });
                    if (!res.ok) throw new Error('用户列表读取失败');
                    const data = await res.json();
                    setUserList(data.users || []);
                } catch (e) {
                    console.error(e);
                }
            };

            useEffect(() => {
                loadUsers();
            }, [authToken, currentUser?.role]);

            const createUser = async () => {
                if (!newUser.username || !newUser.password) {
                    alert('请填写账号和密码');
                    return;
                }
                try {
                    const res = await fetch(`${apiBase}/api/users`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-auth-token': authToken },
                        body: JSON.stringify(newUser),
                    });
                    if (!res.ok) throw new Error('创建用户失败');
                    setNewUser({ username: '', password: '', role: 'operator' });
                    loadUsers();
                    alert('用户创建成功');
                } catch (e) {
                    alert(`创建失败：${e.message}`);
                }
            };

            const deleteUser = async (id) => {
                if (!window.confirm('确认删除该用户？')) return;
                try {
                    const res = await fetch(`${apiBase}/api/users/${id}`, {
                        method: 'DELETE',
                        headers: { 'x-auth-token': authToken },
                    });
                    if (!res.ok) throw new Error('删除失败');
                    loadUsers();
                } catch (e) {
                    alert(`删除失败：${e.message}`);
                }
            };

            const renderTable = (title, rows, setRows, cols) => (
                <div className="bg-white/90 backdrop-blur p-6 rounded-2xl shadow-lg border border-white/50">
                    <h2 className="font-bold text-lg mb-3">{title}</h2>
                    <div className="overflow-x-auto">
                        <table className="min-w-full bg-white">
                            <thead className="bg-gray-100">
                                <tr>
                                    {cols.map(c => <th key={c.key} className="text-left py-3 px-4 font-medium text-gray-600">{c.label}</th>)}
                                    <th className="text-left py-3 px-4 font-medium text-gray-600">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.map(row => (
                                    <tr key={row.id} className="border-b hover:bg-gray-50">
                                        {cols.map(c => (
                                            <td key={c.key} className="py-2 px-4">
                                                <input
                                                    type={c.type || 'text'}
                                                    value={row[c.key] ?? ''}
                                                    onChange={(e) => setRows(prev => prev.map(x => x.id === row.id ? { ...x, [c.key]: c.type === 'number' ? Number(e.target.value) : e.target.value } : x))}
                                                    className="w-full p-2 border rounded-md"
                                                />
                                            </td>
                                        ))}
                                        <td className="py-2 px-4">
                                            <button onClick={() => setRows(prev => prev.filter(x => x.id !== row.id))} className="text-red-500 hover:text-red-700">删除</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            const applyBatchLimit = () => {
                setInvTeachers(prev => prev.map(t => ({ ...t, maxInvigilations: Math.max(0, Number(invDefaultLimit) || 0) })));
                alert('批量次数设置完成');
            };

            const roleFields = [
                ['chief', '主考'],
                ['viceChief', '副主考'],
                ['affairsTeam', '考务组员'],
                ['signaler', '司号'],
                ['scanner', '试卷扫描'],
                ['affairsOffice', '考务室']
            ];

            const saveDefaultTemplate = () => {
                localStorage.setItem('invigilatorDefaultTemplate', JSON.stringify({ invDefaultLimit, invRoles }));
                alert('默认模板已保存');
            };

            const loadDefaultTemplate = () => {
                const raw = localStorage.getItem('invigilatorDefaultTemplate');
                if (!raw) {
                    alert('暂无默认模板');
                    return;
                }
                try {
                    const parsed = JSON.parse(raw);
                    setInvDefaultLimit(Number(parsed.invDefaultLimit) || 2);
                    setInvRoles(parsed.invRoles || invRoles);
                    alert('默认模板已加载');
                } catch (e) {
                    alert('默认模板解析失败');
                }
            };

            return (
                <div className="space-y-5">
                    <div className="bg-white/70 backdrop-blur-xl p-5 rounded-2xl shadow-lg border border-white/70 flex items-center justify-between">
                        <div>
                            <div className="font-semibold text-gray-800">教师信息（学科/年级/姓名）</div>
                            <div className="text-xs text-gray-500 mt-1">考场与考试场次自动复用基础数据，无需二次导入</div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={downloadTeacherTemplate} className="bg-white text-slate-700 border border-slate-200 px-3 py-2.5 rounded-xl hover:bg-slate-50 text-sm font-medium">下载模板</button>
                            <label className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 py-2.5 rounded-xl cursor-pointer hover:shadow text-sm font-medium">
                                导入教师Excel
                                <input type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={importTeachers} />
                            </label>
                        </div>
                    </div>

                    {renderTable('监考教师列表', invTeachers, setInvTeachers, [
                        { key: 'subject', label: '学科' },
                        { key: 'grade', label: '年级' },
                        { key: 'name', label: '姓名' },
                        { key: 'maxInvigilations', label: '次数上限', type: 'number' }
                    ])}

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">

                        <div className="bg-white/70 backdrop-blur-xl p-5 rounded-2xl shadow-lg border border-white/70">
                            <h2 className="font-bold text-lg mb-3">岗位配置与模板</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">

                                        <input
                                            value={invRoles[key] || ''}

                            </div>
                        </div>
                    </div>

                    {currentUser?.role === 'admin' && (
                        <div className="bg-white/70 backdrop-blur-xl p-5 rounded-2xl shadow-lg border border-white/70">
                            <h2 className="font-bold text-lg mb-3">系统用户管理</h2>
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-2 mb-3">
                                <input value={newUser.username} onChange={(e) => setNewUser(prev => ({ ...prev, username: e.target.value }))} placeholder="账号" className="p-2 border rounded-md" />
                                <input type="password" value={newUser.password} onChange={(e) => setNewUser(prev => ({ ...prev, password: e.target.value }))} placeholder="密码" className="p-2 border rounded-md" />
                                <select value={newUser.role} onChange={(e) => setNewUser(prev => ({ ...prev, role: e.target.value }))} className="p-2 border rounded-md">
                                    <option value="operator">普通用户</option>
                                    <option value="admin">管理员</option>
                                </select>
                                <button onClick={createUser} className="bg-indigo-600 text-white rounded-md px-3 py-2">新增用户</button>
                            </div>
                            <div className="overflow-x-auto border rounded-lg">
                                <table className="min-w-full bg-white text-sm">
                                    <thead className="bg-gray-100">
                                        <tr>
                                            <th className="text-left py-2 px-3">账号</th>
                                            <th className="text-left py-2 px-3">角色</th>
                                            <th className="text-left py-2 px-3">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {userList.map(user => (
                                            <tr key={user.id} className="border-b">
                                                <td className="py-2 px-3">{user.username}</td>
                                                <td className="py-2 px-3">{user.role}</td>
                                                <td className="py-2 px-3">
                                                    <button onClick={() => deleteUser(user.id)} className="text-red-600 hover:text-red-700">删除</button>
